name: CI — Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build and Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Java 21 (Corretto — runtime otimizado para AWS Lambda)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      # 3. Cache do repositório Maven local (acelera builds subsequentes)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Exibir versões do ambiente
      - name: Display environment info
        run: |
          java -version
          mvn -version

      # 5. Verificar o projeto (compila + roda testes)
      - name: Run unit tests
        run: mvn test --batch-mode --no-transfer-progress

      # 6. Build do fat JAR para deploy na AWS
      - name: Build deployable fat JAR
        run: mvn package -DskipTests --batch-mode --no-transfer-progress

      # 7. Verificar que o artefato foi gerado corretamente
      - name: Verify artifact exists
        run: |
          ls -lh target/*.jar
          echo "Build artifact: $(ls target/*-aws.jar)"

      # 8. Upload do artefato como GitHub Actions artifact (para uso em CD)
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment-package
          path: target/lambda-1.0.0-aws.jar
          retention-days: 7

  # Job separado: validação do SAM template
  validate-sam:
    name: Validate SAM Template
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Validate SAM template
        run: sam validate --template template.yaml --lint
        continue-on-error: true  # SAM validate requer credenciais AWS em alguns casos
